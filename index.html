<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirChecker Live Dashboard</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background: #050505; font-family: 'Courier New', monospace; padding: 10px; color: #e0e0e0; text-align: center; margin: 0; }
        .container { max-width: 800px; margin: auto; padding-bottom: 20px; }
        .header { margin-bottom: 20px; }
        h1 { color: #00f3ff; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,243,255,0.4); font-size: 1.5rem;}
        .status { font-size: 0.8rem; color: #888; margin-bottom: 15px; }
        
        .card { background: #101010; padding: 15px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #222; text-align: left; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .valore { font-size: 2rem; font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.2); margin: 0; }
        .meteo-box { text-align: center; font-size: 1.5rem; font-weight: bold; }
        
        .chart-container { position: relative; height: 150px; width: 100%; margin-top: 10px; }

        /* Colori Neon */
        .t-co2 { color: #00f3ff; } 
        .t-voc { color: #00ff41; } 
        .t-nox { color: #ffee00; } 
        .t-pm { color: #bc13fe; } 
        .t-meteo { color: #ff9f43; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AirChecker Live</h1>
            <div id="status" class="status">In attesa del segnale remoto... 📡</div>
        </div>

        <div class="card" style="text-align: center;">
            <div class="title t-meteo" style="margin-bottom: 10px;">Clima Interno</div>
            <div class="meteo-box t-meteo">
                🌡️ <span id="val-temp">--.-</span>°C &nbsp;|&nbsp; 💧 <span id="val-hum">--</span>%
            </div>
        </div>

        <div class="card">
            <div class="card-header t-co2">
                <div class="title">CO2 (ppm)</div>
                <div class="valore" id="val-co2">---</div>
            </div>
            <div class="chart-container"><canvas id="chart-co2"></canvas></div>
        </div>

        <div class="card">
            <div class="card-header t-voc">
                <div class="title">VOC (Index)</div>
                <div class="valore" id="val-voc">---</div>
            </div>
            <div class="chart-container"><canvas id="chart-voc"></canvas></div>
        </div>

        <div class="card">
            <div class="card-header t-nox">
                <div class="title">NOx (Index)</div>
                <div class="valore" id="val-nox">---</div>
            </div>
            <div class="chart-container"><canvas id="chart-nox"></canvas></div>
        </div>

        <div class="card" id="card-pm" style="display: none;">
            <div class="card-header t-pm">
                <div class="title">PM 2.5 (µg/m³)</div>
                <div class="valore" id="val-pm25">---</div>
            </div>
            <div class="chart-container"><canvas id="chart-pm"></canvas></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAZIONE GRAFICI (Chart.js) ---
        Chart.defaults.color = '#888';
        Chart.defaults.borderColor = '#222';
        Chart.defaults.font.family = "'Courier New', monospace";
        
        const maxDataPoints = 30; // Quanti punti mostrare sullo schermo
        
        const chartOptions = {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 400 },
            elements: { point: { radius: 0, hitRadius: 10 }, line: { tension: 0.4 } },
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { beginAtZero: false, position: 'right' } }
        };

        function createLiveChart(ctxId, color) {
            return new Chart(document.getElementById(ctxId), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, backgroundColor: color + '20', fill: true, borderWidth: 2 }] },
                options: chartOptions
            });
        }

        // Creazione istanze grafici
        const chartCO2 = createLiveChart('chart-co2', '#00f3ff');
        const chartVOC = createLiveChart('chart-voc', '#00ff41');
        const chartNOx = createLiveChart('chart-nox', '#ffee00');
        const chartPM  = createLiveChart('chart-pm', '#bc13fe');

        function updateChart(chart, label, dataValue) {
            chart.data.labels.push(label);
            chart.data.datasets[0].data.push(dataValue);
            if (chart.data.labels.length > maxDataPoints) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        // --- CONNESSIONE MQTT E AGGIORNAMENTO DATI ---
        const urlParams = new URLSearchParams(window.location.search);
        const mac = urlParams.get('id');

        if (!mac) {
            document.getElementById('status').innerHTML = "🔴 Errore: ID Dispositivo mancante nel link!";
        } else {
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            client.on('connect', function () {
                document.getElementById('status').innerHTML = "🟢 Connesso al dispositivo in diretta";
                document.getElementById('status').style.color = "#00ff41";
                client.subscribe('airchecker/' + mac + '/live');
            });

            client.on('message', function (topic, message) {
                try {
                    const dati = JSON.parse(message.toString());
                    const timeNow = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                    
                    // Aggiorna i testi
                    document.getElementById('val-co2').innerText = dati.co2;
                    document.getElementById('val-voc').innerText = dati.voc;
                    document.getElementById('val-nox').innerText = dati.nox;
                    document.getElementById('val-temp').innerText = dati.temp.toFixed(1);
                    document.getElementById('val-hum').innerText = Math.round(dati.hum);
                    
                    // Aggiorna i grafici in tempo reale
                    updateChart(chartCO2, timeNow, dati.co2);
                    updateChart(chartVOC, timeNow, dati.voc);
                    updateChart(chartNOx, timeNow, dati.nox);

                    // Gestione Sensore Polveri (PM)
                    if (dati['pm2.5'] !== undefined) {
                        document.getElementById('card-pm').style.display = "block";
                        document.getElementById('val-pm25').innerText = dati['pm2.5'].toFixed(1);
                        updateChart(chartPM, timeNow, dati['pm2.5']);
                    }
                } catch (e) {
                    console.log("Errore JSON", e);
                }
            });

            client.on('error', function (error) {
                document.getElementById('status').innerText = "🔴 Server offline o disconnesso.";
                document.getElementById('status').style.color = "red";
            });
        }
    </script>
</body>
</html>
